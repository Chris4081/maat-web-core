<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">MAAT Core</title>
  <desc id="desc">Five-point MAAT core symbol with a central feather and balance axis.</desc>
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="45%" r="58%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="44%" stop-color="#dff8ed" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#071014" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="ringStroke" x1="18" y1="18" x2="110" y2="110">
      <stop offset="0%" stop-color="#78d6b2"/>
      <stop offset="38%" stop-color="#e6c76b"/>
      <stop offset="72%" stop-color="#80a7f2"/>
      <stop offset="100%" stop-color="#dd7f9a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <circle cx="64" cy="64" r="56" fill="url(#coreGlow)" filter="url(#softShadow)"/>
